    <!-- Prevent FOUC: apply dark class before first paint -->
    <script>
      (function() {
        var t = localStorage.getItem('md-view-theme');
        var dark = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- PWA self-recovery: if the app fails to mount (white screen), nuke caches and reload -->
    <script>
      (function() {
        var TIMEOUT = 8000;
        var root = document.getElementById('root');
        if (!root) return;

        var timer = setTimeout(function() {
          if (root.children.length > 0) return;
          console.warn('[PWA Recovery] App failed to mount after ' + TIMEOUT + 'ms. Clearing caches and reloading...');

          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
            );
          }
          if ('caches' in window) {
            tasks.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              })
            );
          }

          Promise.all(tasks).finally(function() {
            window.location.replace(window.location.pathname + '?recovered=' + Date.now());
          });
        }, TIMEOUT);

        // Cancel recovery if app mounts successfully
        var obs = new MutationObserver(function(_, o) {
          if (root.children.length > 0) {
            clearTimeout(timer);
            o.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>
  </body>
